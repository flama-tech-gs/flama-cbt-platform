<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Flama CBT</title>

    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/pages/login.css" />
  </head>

  <body>
    <main class="login-page">
      <!-- HEADER -->
      <section class="login-header">
        <img src="./assets/icons/logo.png" alt="School Logo" class="logo" />
        <h1>Mobayo Academic</h1>
        <p class="tagline">...Knowledge, Discipline, Excellence...</p>
      </section>

      <!-- CARD -->
      <section class="login-card">
        <form class="login-form">
          <!-- Access Code -->
          <div class="form-group">
            <label>Access Code</label>
            <input type="text" placeholder="e.g JS/50/2024" required />
          </div>

          <!-- Password -->
          <div class="form-group">
            <label>Password</label>

            <div class="password-wrapper">
              <input
                type="password"
                placeholder="Enter password"
                id="password"
                required
              />
              <span class="toggle-password" id="togglePassword">👁️</span>
            </div>

            <small class="hint">password must be in title case</small>
          </div>

          <!-- Forgot -->
          <div class="forgot">
            <a href="#">Forget password?</a>
          </div>

          <!-- Button -->
          <button type="submit" class="login-btn">Login →</button>
        </form>
      </section>

      <!-- FOOTER -->
      <p class="access-note">
        ...Access is restricted to registered students and staff only...
      </p>
    </main>

    <script src="../js/pages/login.js"></script>
  </body>
</html>
