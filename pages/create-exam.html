<form id="examForm">
  <input id="title" placeholder="Exam Title" />
  <input id="subjectIdentifier" placeholder="Subject ID or Code" />
  <textarea id="instructions" placeholder="Instructions"></textarea>
  <input id="duration" placeholder="Duration (mins)" />
  <input id="term" placeholder="Term" />
  <input id="session" placeholder="Session" />
  <input id="startDate" type="date" />
  <input id="endDate" type="date" />

  <button type="submit">Create Exam</button>
</form>


<script src="../js/pages/api.js"></script>
<script src="../js/pages/create-exam.js"></script>
