<form id="questionForm">
  <input id="examId" placeholder="Exam ID" />
  <input id="question" placeholder="Question" />

  <input id="a" placeholder="Option A" />
  <input id="b" placeholder="Option B" />
  <input id="c" placeholder="Option C" />
  <input id="d" placeholder="Option D" />
  <input id="e" placeholder="Option E" />

  <input id="correctAnswer" placeholder="Correct Answer (a-e)" />
  <input id="marks" placeholder="Marks" />

  <button type="submit">Add Question</button>
</form>
